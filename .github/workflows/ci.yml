name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m py_compile app/main.py
      - run: python -m py_compile app/config.py
      - run: python -m py_compile app/database.py
      - run: python -m py_compile app/clients.py
      - run: python -m py_compile app/services/summarizer.py
      - run: python -m py_compile app/services/youtube.py
      - run: python -m py_compile app/services/document.py
      - run: python -m py_compile app/services/storage.py
      - run: python -m py_compile app/routes/summarize.py
      - run: python -m py_compile app/routes/collections.py

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
